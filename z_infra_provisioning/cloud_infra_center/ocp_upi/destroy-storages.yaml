#
# Change Summary:
# - Delete unnecessary Ansible tasks
# - Read compute nodes names from json

# Required Python packages:
#
# ansible
# openstackclient
# openstacksdk

- hosts: localhost
  gather_facts: false
  tasks:
    - name: 'Import common yaml'
      ansible.builtin.include_tasks: "{{ playbook_dir }}/common.yaml"

    - name: 'Export infra ID'
      ansible.builtin.shell:
        cmd: "jq -r .infraID metadata.json"
      register: infra_id

    - name: 'Get storage nodes from ICIC command line'
      ansible.builtin.shell: |
        openstack server list -c Name -f value | awk '/{{ os_storage_server_name }}/'
      register: computes
      ignore_errors: true

    - name: 'Remove all storage nodes'
      ansible.builtin.shell:
        cmd: "openstack server delete {{ item.1 }}"
      with_indexed_items: "{{ computes.stdout_lines }}"
      when: compute_index is not defined

    - name: 'Remove specific storage nodes'
      ansible.builtin.shell:
        cmd: "openstack server delete {{ os_storage_server_name }}-{{ item }}"
      loop: "{{compute_index}}"
      when: compute_index is defined
