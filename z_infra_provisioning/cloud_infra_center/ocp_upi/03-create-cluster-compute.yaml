---
- import_playbook: configure-compute-nodes-kvm.yaml
  when: vm_type == "kvm"
- import_playbook: configure-compute-nodes-zvm.yaml
  when: vm_type == "zvm"

- import_playbook: configure-storage-nodes-kvm.yaml
  when: vm_type == "kvm" and os_storage_nodes_number > 0
- import_playbook: configure-storage-nodes-zvm.yaml
  when: vm_type == "zvm" and os_storage_nodes_number > 0


- import_playbook: configure-infra-nodes-kvm.yaml
  when: vm_type == "kvm" and os_infra_nodes_number > 0 
- import_playbook: configure-infra-nodes-zvm.yaml
  when: vm_type == "zvm" and os_infra_nodes_number > 0 


- import_playbook: approve.yaml
- import_playbook: wait-for-install-complete.yaml


- hosts: localhost
  gather_facts: false
  tasks:
    - name: 'Update storage node label and taint'
      ansible.builtin.include_tasks: label-workers.yaml
      vars:
        workerid: "{{ item.1 }}-{{ item.0 }}"
      when: os_storage_nodes_number > 0 
      with_indexed_items: "{{ [os_storage_server_name] * os_storage_nodes_number }}"

    - name: 'Update infra node label and taint'
      ansible.builtin.include_tasks: label-workers.yaml
      vars:
        workerid: "{{ item.1 }}-{{ item.0 }}"
      when: os_infra_nodes_number > 0 
      with_indexed_items: "{{ [os_infra_server_name] * os_infra_nodes_number }}"